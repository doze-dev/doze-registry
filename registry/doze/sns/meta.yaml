title: SNS
tagline: Local SNS topics + subscriptions.
category: queue
engine: sns
description: >
  SNS-compatible pub/sub built into doze — declare topics and subscriptions and
  fan out to SQS queues, with filter policies and raw delivery. Wires to an sqs
  instance by reference. No LocalStack; built ground-up alongside doze's S3/SQS.
homepage: https://github.com/doze-dev/doze-modules/tree/main/modules/sns
source: https://github.com/doze-dev/doze-modules
exampleLabel: events
example: |
  sns "events" {
    sqs = sqs.jobs.name

    topic "signups" {}

    subscribe "signups" {
      protocol = "sqs"
      endpoint = "emails"
      raw      = true
    }
  }
options:
  - name: topic
    desc: A topic to create.
  - name: subscribe
    desc: A subscription fanning a topic out to an endpoint.
  - name: sqs
    desc: The sqs instance this topic delivers into.

title: SNS
tagline: Local SNS topics + subscriptions.
category: queue
engine: sns
port: 9911
example: |-
    sns "signups" {
      port = 9911
      sqs  = sqs.jobs.name

      subscribe {
        protocol = "sqs"
        endpoint = "jobs"
        raw      = true

        filter = {
          event_type = ["created", "paid"]
        }
      }
    }
exampleLabel: signups
description: SNS-compatible pub/sub built into doze — one topic per instance (the topic name is the instance name), with subscriptions fanning out to SQS queues, filter policies, and raw delivery. Wires to an sqs instance by reference. No LocalStack; built ground-up alongside doze's S3/SQS.
homepage: https://github.com/doze-dev/doze-modules/tree/main/modules/sns
source: doze/sns
config:
    arguments:
        - name: sqs
          type: string
          desc: The sqs instance (by reference) subscriptions deliver into.
    blocks:
        - name: subscribe
          desc: A subscription fanning the topic out to an endpoint.
          arguments:
            - name: protocol
              type: string
              desc: Delivery protocol (sqs, http, https).
              required: true
            - name: endpoint
              type: string
              desc: Target endpoint — e.g. an SQS queue name or a webhook URL.
              required: true
            - name: raw
              type: bool
              default: "false"
              desc: Raw message delivery (no SNS envelope).
            - name: filter
              type: map(list(string))
              desc: Subscription filter policy by attribute.

title: SNS
tagline: Local SNS topics + subscriptions.
category: queue
engine: sns
description: >
  SNS-compatible pub/sub built into doze — declare topics and subscriptions and
  fan out to SQS queues, with filter policies and raw delivery. Wires to an sqs
  instance by reference. No LocalStack; built ground-up alongside doze's S3/SQS.
homepage: https://github.com/doze-dev/doze-modules/tree/main/modules/sns
source: https://github.com/doze-dev/doze-modules
exampleLabel: events
example: |
  sns "events" {
    sqs = sqs.jobs.name

    topic "signups" {}
    topic "orders" {}

    subscribe "signups" {
      protocol = "sqs"
      endpoint = "emails"
      raw      = true
    }

    subscribe "orders" {
      protocol = "sqs"
      endpoint = "orders"

      filter = {
        event_type = ["created", "paid"]
      }
    }
  }
config:
  arguments:
    - { name: sqs, type: string, desc: "The sqs instance (by reference) this topic delivers into." }
  blocks:
    - name: topic
      label: name
      desc: "A topic to create on boot."
      arguments: []
    - name: subscribe
      label: topic
      desc: "A subscription fanning a topic out to an endpoint."
      arguments:
        - { name: protocol, type: string, required: true, desc: "Delivery protocol (sqs, …)." }
        - { name: endpoint, type: string, required: true, desc: "Target endpoint — e.g. an SQS queue name." }
        - { name: raw, type: bool, default: "false", desc: "Raw message delivery (no SNS envelope)." }
        - { name: filter, type: "map(list(string))", desc: "Subscription filter policy by attribute." }

title: DocumentDB
tagline: MongoDB-compatible, on Postgres.
category: database
engine: documentdb
description: >
  A local MongoDB-compatible database — FerretDB v2 speaking the Mongo wire
  protocol over a Postgres engine with the DocumentDB extension stack. Point any
  mongo client (mongosh, drivers) at it; CRUD, aggregation and indexes work. A
  composite engine doze boots and tears down as one unit — zero configuration.
homepage: https://github.com/doze-dev/doze-modules/tree/main/modules/documentdb
source: https://github.com/doze-dev/doze-modules
exampleLabel: docs
example: |
  documentdb "docs" {
    port = 27017
  }
config:
  arguments: []
  note: >
    DocumentDB takes no arguments today — declare the block and connect with the
    instance's MONGODB_URI. The FerretDB + Postgres composite is a single fixed
    build.
